# Cortex — pull request and main branch CI
name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest
        env:
          CORTEX_CONTRADICTION_ENABLED: "false"
        run: pytest tests/

      - name: Demo seed script (dry-run, no Neo4j)
        run: python scripts/seed_demo.py --dry-run

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install, test, and build dashboard
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build
