# Live stack validation — Neo4j + Redis + API, staging smoke, and k6 load test.
name: Staging validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "graph/**"
      - "scripts/**"
      - "docker-compose.yml"
      - ".github/workflows/staging-validation.yml"

permissions:
  contents: read

concurrency:
  group: staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: cortex_local
      CORTEX_WORKSPACE_ID: ci-staging
      CORTEX_CONTRADICTION_ENABLED: "false"
      K6_VUS: "8"
      K6_DURATION: "20s"
      K6_P95_MS: "5000"
      MAX_P95_MS: "5000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Live stack validation
        run: bash scripts/ci_staging_validation.sh

      - name: Dump API logs on failure
        if: failure()
        run: docker compose logs api --tail 120
