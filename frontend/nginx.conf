server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker-internal API service. Using a variable + resolver keeps nginx from
    # failing to start if the API container is not yet up.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $cortex_api "http://api:8000";

    # Always revalidate shell so UI updates appear after image rebuilds.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Same-origin API proxy — the SPA calls relative paths like /query.
    location ~ ^/(health|query|inject|remember|decisions|contradictions|docs|openapi\.json)(/|$) {
        proxy_pass $cortex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
